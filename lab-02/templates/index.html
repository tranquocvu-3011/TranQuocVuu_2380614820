<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 02 - Cipher Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-3">Lab 02 - Cipher Demo</h1>
            <p class="text-muted">Select an algorithm:</p>
            <div class="list-group">
                {% for key, label in ciphers.items() %}
                <a class="list-group-item list-group-item-action" href="/{{ key }}">{{ label }}</a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
